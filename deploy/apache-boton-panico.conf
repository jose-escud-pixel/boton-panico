# ========================================================
# === BOTON DE PANICO - ÑACURUTU SEGURIDAD (puerto 8005) ===
# ========================================================

# --- IMPORTANTE: WebSocket upgrade para Socket.IO ---
# Se evalúa ANTES que los ProxyPass normales
RewriteEngine On
RewriteCond %{HTTP:Upgrade} websocket [NC]
RewriteCond %{HTTP:Connection} upgrade [NC]
RewriteRule ^/boton-panico/api/socket\.io/(.*) ws://127.0.0.1:8005/api/socket.io/$1 [P,L]

# --- Proxy HTTP para Socket.IO (polling) y REST API ---
ProxyPass        /boton-panico/api  http://127.0.0.1:8005/api
ProxyPassReverse /boton-panico/api  http://127.0.0.1:8005/api

# --- Carpeta de descargas (APK Android) ---
# IMPORTANTE: Este Alias debe ir ANTES de "Alias /boton-panico ..."
# Apache matchea aliases en orden, el más específico primero.
Alias /boton-panico/downloads /var/www/boton-panico/downloads

<Directory /var/www/boton-panico/downloads>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    # Forzar descarga como APK (no servir como HTML)
    <FilesMatch "\.apk$">
        ForceType application/vnd.android.package-archive
        Header set Content-Disposition "attachment"
    </FilesMatch>

    # Desactivar rewrites heredados para que NO caiga en index.html
    RewriteEngine Off
</Directory>

# --- Sirve el build de React ---
Alias /boton-panico /var/www/boton-panico/frontend/build

<Directory /var/www/boton-panico/frontend/build>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted

    RewriteEngine On
    RewriteBase /boton-panico/
    RewriteRule ^index\.html$ - [L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /boton-panico/index.html [L]
</Directory>

# =========================================================
# AJUSTE EN EL BLOQUE DE ARANDU&JAR (DocumentRoot raíz)
# Añadir esta línea DENTRO del <Directory /var/www/arandujar/frontend/build>
# junto a las otras RewriteCond !^/... (para que / no capture /boton-panico)
# =========================================================
#
#   RewriteCond %{REQUEST_URI} !^/boton-panico
#
