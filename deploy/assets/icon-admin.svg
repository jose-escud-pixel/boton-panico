<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Admin app launcher: dark tactical + ÑACURUTU owl + prominent ADMIN badge -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>

  <!-- Solid background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Owl centered upper 2/3 -->
  <g transform="translate(96,40) scale(5)">
    <!-- Body -->
    <path d="M32 58c-11 0-19-8-19-21 0-10 5-17 12-21 2-1 2-2 2-4 0-2 2-4 5-4s5 2 5 4c0 2 0 3 2 4 7 4 12 11 12 21 0 13-8 21-19 21z"
          fill="#18181b" stroke="#e11d48" stroke-width="2.5"/>
    <!-- Ear tufts -->
    <path d="M16 20 L10 8 L22 14 Z" fill="#e11d48"/>
    <path d="M48 20 L54 8 L42 14 Z" fill="#e11d48"/>
    <!-- Eyes -->
    <circle cx="24" cy="30" r="7" fill="#fbbf24"/>
    <circle cx="24" cy="30" r="3" fill="#09090b"/>
    <circle cx="40" cy="30" r="7" fill="#fbbf24"/>
    <circle cx="40" cy="30" r="3" fill="#09090b"/>
    <!-- Beak -->
    <path d="M32 36 L28 42 L36 42 Z" fill="#fbbf24"/>
    <!-- Chest detail -->
    <path d="M32 44 Q28 48 32 52 Q36 48 32 44" fill="none" stroke="#3f3f46" stroke-width="1.5"/>
  </g>

  <!-- ADMIN ribbon — grande y legible -->
  <rect x="56" y="410" width="400" height="72" rx="12" fill="#e11d48"/>
  <rect x="56" y="410" width="400" height="72" rx="12" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <text x="256" y="464" text-anchor="middle"
        font-family="Arial Black, Helvetica, sans-serif" font-weight="900"
        font-size="62" fill="#fff" letter-spacing="8">ADMIN</text>
</svg>
